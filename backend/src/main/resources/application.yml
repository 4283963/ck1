server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: vaccine-coldchain
  datasource:
    url: jdbc:postgresql://localhost:5432/vaccine_coldchain
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

logging:
  level:
    com.coldchain.vaccine: debug
